name: docs

# Build the MkDocs site and deploy it to GitHub Pages on every push to main.
# One-time setup: in the repo, Settings → Pages → "Build and deployment" →
# Source = "GitHub Actions".

on:
  push:
    branches: [main]
    # Only rebuild when docs-related inputs change.
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements.txt"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs on new pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: true # enables the social-card plugin (see mkdocs.yml)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for git-revision-date timestamps

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: pip

      # Native deps for the social plugin (Cairo/Pango) + fonts.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libfreetype6-dev libffi-dev \
            libjpeg-dev libpng-dev libz-dev

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build site
        run: mkdocs build --strict

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
