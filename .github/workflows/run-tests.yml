name: ci
on: [push]
jobs:
  lint-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          pip install networkx
          sudo apt-get install -y clang-format-20

      - name: Check circular dependencies
        run: python3 find_circ_deps.py

      - name: Check formatting
        run: python3 ./format.py

  cppcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Cache cppcheck binary
        uses: actions/cache@v3
        with:
          path: cppcheck_dir
          key: cppcheck-2.17.1

      - name: Run cppcheck static analysis
        run: ./cppcheck.sh

  clang-tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Run clang-tidy static analysis
        run: |
          sudo apt-get install -y clang-tidy-18 && ./tidy.sh clang-tidy-18

  unit-tests-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up GCC
        uses: egor-tensin/setup-gcc@v1
        with:
          version: latest
          platform: x64

      - name: Get datafile cache
        id: cache-datafiles
        uses: actions/cache@v3
        with:
          path: |
            data/*
            testdata/*
          key: downloaded-data-files-30

      - name: Download data files and convert lexica
        if: steps.cache-datafiles.outputs.cache-hit != 'true'
        run: ./download_data.sh && ./convert_lexica.sh

      - name: Build release test binary
        run: make magpie_test BUILD=release

      - name: Run release tests
        run: ./bin/magpie_test

  unit-tests-dev:
    name: unit-tests-dev (${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: ap_default
            tests: "ap_default"
          - shard: ap_wmp
            tests: "ap_wmp"
          - shard: ap_rest
            tests: "ap_rest"
          - shard: sim
            tests: "sim endgame klv"
          - shard: eldar_v
            tests: "eldar_v"
          - shard: config
            tests: "config movegen gameplay players string alpha ld l leavemap kwg bag rack bitrack board layout cs move game vm shadow eq eqadj stats infer rv am"
          - shard: rest
            tests: "hm math bai command gcg words wordprune kwgmaker cgp rl ch cv cd wmp wmpmaker wmg winpct zobrist tt load"
          - shard: ap_rit
            tests: "ap_rit"
    steps:
      - uses: actions/checkout@v3

      - name: Set up GCC
        uses: egor-tensin/setup-gcc@v1
        with:
          version: latest
          platform: x64

      - name: Get datafile cache
        id: cache-datafiles
        uses: actions/cache@v3
        with:
          path: |
            data/*
            testdata/*
          key: downloaded-data-files-30

      - name: Download data files and convert lexica
        if: steps.cache-datafiles.outputs.cache-hit != 'true'
        run: ./download_data.sh && ./convert_lexica.sh

      - name: Build release binary for RIT construction
        if: matrix.shard == 'ap_rit'
        run: make magpie BUILD=release

      - name: Build RIT for TWL98
        if: matrix.shard == 'ap_rit'
        run: echo "convert klvwmp2rit TWL98" | ./bin/magpie "set -lex TWL98 -wmp true -rit false"

      - name: Build dev test binary
        run: make magpie_test

      - name: Run dev tests
        run: ./bin/magpie_test ${{ matrix.tests }}

  unit-tests-super:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up GCC
        uses: egor-tensin/setup-gcc@v1
        with:
          version: latest
          platform: x64

      - name: Get datafile cache
        id: cache-datafiles
        uses: actions/cache@v3
        with:
          path: |
            data/*
            testdata/*
          key: downloaded-data-files-30

      - name: Download data files and convert lexica
        if: steps.cache-datafiles.outputs.cache-hit != 'true'
        run: ./download_data.sh && ./convert_lexica.sh

      - name: Build and run super release tests
        run: |
          make magpie_test BUILD=release BOARD_DIM=21
          ./bin/magpie_test

      - name: Build and run super dev tests
        run: |
          make clean
          make magpie_test BOARD_DIM=21
          ./bin/magpie_test

  wasm-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v3

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Get datafile cache
        id: cache-datafiles
        uses: actions/cache@v3
        with:
          path: |
            data/*
            testdata/*
          key: downloaded-data-files-30

      - name: Download data files and convert lexica
        if: steps.cache-datafiles.outputs.cache-hit != 'true'
        run: ./download_data.sh && ./convert_lexica.sh

      - name: Build WASM tests
        run: make -f Makefile-wasm magpie_wasm_test

      - name: Run WASM tests
        run: node ./bin/magpie_wasm_test.js endgame_wasm tt zobrist

  ci-summary:
    if: always()
    needs:
      - lint-fast
      - cppcheck
      - clang-tidy
      - unit-tests-release
      - unit-tests-dev
      - unit-tests-super
      - wasm-tests
    runs-on: ubuntu-latest
    steps:
      - name: CI Results
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| lint-fast | \`${{ needs.lint-fast.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| cppcheck | \`${{ needs.cppcheck.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| clang-tidy | \`${{ needs.clang-tidy.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| unit-tests-release | \`${{ needs.unit-tests-release.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| unit-tests-dev | \`${{ needs.unit-tests-dev.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| unit-tests-super | \`${{ needs.unit-tests-super.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| wasm-tests | \`${{ needs.wasm-tests.result }}\` |" >> $GITHUB_STEP_SUMMARY

      - name: Check for failures
        if: |
          needs.lint-fast.result != 'success' ||
          needs.cppcheck.result != 'success' ||
          needs.clang-tidy.result != 'success' ||
          needs.unit-tests-release.result != 'success' ||
          needs.unit-tests-dev.result != 'success' ||
          needs.unit-tests-super.result != 'success' ||
          needs.wasm-tests.result != 'success'
        run: exit 1
