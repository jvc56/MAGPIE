name: pgo-performance

on:
  workflow_dispatch:
    inputs:
      architecture:
        description: Architecture to profile
        required: true
        default: x86-64
        type: choice
        options:
          - x86-64
          - arm64
          - both
  pull_request:
    paths:
      - ".github/workflows/pgo-performance.yml"
      - "Makefile"
      - "pgo_benchmark.py"
      - "src/**"
      - "test/sim_benchmark_test.c"

permissions:
  contents: read

jobs:
  validate-pgo:
    name: validate-pgo (${{ matrix.arch }})
    runs-on: >-
      ${{ matrix.arch == 'x86-64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        arch: >-
          ${{ fromJSON(
            github.event_name == 'workflow_dispatch' &&
            inputs.architecture == 'x86-64' && '["x86-64"]' ||
            github.event_name == 'workflow_dispatch' &&
            inputs.architecture == 'arm64' && '["arm64"]' ||
            '["x86-64","arm64"]'
          ) }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Clang PGO toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18 lld-18 llvm-18

      - name: Get datafile cache
        id: cache-datafiles
        uses: actions/cache@v4
        with:
          path: |
            data/*
            !data/lexica/*.rit
            testdata/*
          key: downloaded-data-files-30

      - name: Download data files and convert lexica
        if: steps.cache-datafiles.outputs.cache-hit != 'true'
        run: ./download_data.sh && ./convert_lexica.sh

      - name: Build release baseline
        run: |
          make clean
          make magpie magpie_test BUILD=release CC=clang-18 LDFLAGS='-pthread -flto -fuse-ld=lld'
          mkdir -p obj/pgo-benchmark
          cp bin/magpie_test obj/pgo-benchmark/magpie_test_release

      - name: Build production CSW24 RIT
        run: >-
          make pgo-rit
          PGO_CC=clang-18
          PGO_LDFLAGS=-fuse-ld=lld

      - name: Train and build PGO
        run: |
          make pgo-train \
            PGO_CC=clang-18 \
            PGO_TRAIN_ENV='SIMBENCH_LEX=CSW24 SIMBENCH_RIT=true SIMBENCH_SEED=42'
          make pgo-build \
            PGO_CC=clang-18 \
            PGO_LDFLAGS=-fuse-ld=lld \
            LLVM_PROFDATA=/usr/lib/llvm-18/bin/llvm-profdata

      - name: Check PGO correctness
        run: ./bin/magpie_test movegen shadow sim gameplay

      - name: Preserve PGO benchmark binary
        run: cp bin/magpie_test obj/pgo-benchmark/magpie_test_pgo

      - name: Validate held-out performance improvement
        run: >-
          python3 pgo_benchmark.py
          --release obj/pgo-benchmark/magpie_test_release
          --pgo obj/pgo-benchmark/magpie_test_pgo
          --seeds 17 101 313
          --rit true
          --min-improvement 2.0

      - name: Record profile provenance
        env:
          PROFILE_ARCH: ${{ matrix.arch }}
        run: |
          printf 'source_sha=%s\narchitecture=%s\ntraining_seed=42\ntraining_rit=true\n' \
            "$GITHUB_SHA" "$PROFILE_ARCH" >> obj/pgo-data/profile-metadata.txt

      - name: Upload merged profile
        uses: actions/upload-artifact@v4
        with:
          name: magpie-pgo-profile-${{ matrix.arch }}
          path: |
            obj/pgo-data/magpie.profdata
            obj/pgo-data/profile-metadata.txt
          if-no-files-found: error
          retention-days: 30
